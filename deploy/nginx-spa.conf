# SPA: client-side routes (React Router)
# /guide collides with static public/guide/ directory — force index for exact path
location = /guide {
    try_files /index.html =404;
}
location = /guide/ {
    try_files /index.html =404;
}

location / {
    # no $uri/ — avoids 403 directory listing when a static folder name matches a route
    try_files $uri /index.html;
}
